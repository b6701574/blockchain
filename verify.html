<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Certificate Verification</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; margin: 20px auto; }
        .loading { color: #f3841d; font-weight: bold; }
        .result { display: none; }
        .verified-header { color: #28a745; font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .data-box { text-align: left; background: #f8f9fa; padding: 20px; border-radius: 10px; font-family: monospace; word-break: break-all; }
        .error-header { color: #dc3545; font-weight: bold; }
        .footer-link { margin-top: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

    <div class="card">
        <div id="status" class="loading">⏳ กำลังตรวจสอบข้อมูลกับ Blockchain...</div>

        <div id="resultArea" class="result">
            <div class="verified-header">✓ Verified Certificate</div>
            <p>ใบรับรองนี้ได้รับการยืนยันความถูกต้องแล้ว</p>
            <div class="data-box">
                <p><strong>Certificate ID:</strong><br><span id="displayID"></span></p>
                <p><strong>Merkle Root:</strong><br><span id="displayRoot"></span></p>
                <p><strong>Issued At:</strong><br><span id="displayTime"></span></p>
            </div>
            <div class="footer-link">
                <p>Verified by Smart Contract on Sepolia Testnet</p>
            </div>
        </div>

        <div id="errorArea" class="result">
            <div class="error-header">❌ ไม่สามารถยืนยันข้อมูลได้</div>
            <p id="errorMsg"></p>
        </div>
    </div>

    <script>
        // 🚩 1. ใส่ Contract Address ของคุณ
        const CONTRACT_ADDRESS = "0xC3Ba5050Ec45990f76474163c5bA673c244aaECA"; 

        // 🚩 2. ใช้ Public RPC สำหรับ Sepolia (ไม่ต้องง้อ MetaMask)
        const RPC_URL = "https://ethereum-sepolia-rpc.publicnode.com";

        const CONTRACT_ABI = [
            "function certificates(bytes32) external view returns (bytes32 merkleRoot, bool isRevoked, uint256 issuedAt)"
        ];

        async function verify() {
            const status = document.getElementById('status');
            const resultArea = document.getElementById('resultArea');
            const errorArea = document.getElementById('errorArea');

            try {
                // ดึง ID จาก URL
                const params = new URLSearchParams(window.location.search);
                const certId = params.get('id');

                if (!certId) {
                    throw new Error("ไม่พบรหัสใบรับรองในลิงก์");
                }

                // เชื่อมต่อกับ Blockchain ผ่าน Public RPC
                const provider = new ethers.JsonRpcProvider(RPC_URL);
                const contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, provider);

                // ดึงข้อมูล
                const data = await contract.certificates(certId);

                if (data.issuedAt === 0n) {
                    throw new Error("ไม่พบข้อมูลใบรับรองนี้บนระบบ Blockchain");
                }
                if (data.isRevoked) {
                    throw new Error("ใบรับรองนี้ถูกยกเลิก (Revoked) แล้ว");
                }

                // แสดงผล
                document.getElementById('displayID').innerText = certId;
                document.getElementById('displayRoot').innerText = data.merkleRoot;
                const date = new Date(Number(data.issuedAt) * 1000);
                document.getElementById('displayTime').innerText = date.toLocaleString('th-TH');

                status.style.display = 'none';
                resultArea.style.display = 'block';

            } catch (err) {
                console.error(err);
                status.style.display = 'none';
                document.getElementById('errorMsg').innerText = err.message;
                errorArea.style.display = 'block';
            }
        }

        // เริ่มทำงานทันทีที่โหลดหน้าเว็บ
        window.onload = verify;
    </script>
</body>
</html>
