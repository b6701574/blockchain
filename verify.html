<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>SUT Blockchain Transcript</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sut-orange: #e67e22; --bg-color: #f8f9fa; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--sut-orange); }
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .info-item b { color: #888; font-size: 12px; display: block; }
        .info-item span { font-weight: 600; }
        .highlight { color: var(--sut-orange); font-size: 1.2em; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <h2>ข้อมูลใบรับรองดิจิทัล</h2>
    <div id="resultArea">
        <div class="grid-info">
            <div class="info-item"><b>Certificate ID</b> <span id="certId"></span></div>
            <div class="info-item"><b>ชื่อ-นามสกุล</b> <span id="studentName"></span></div>
            <div class="info-item"><b>วันเดือนปีเกิด</b> <span id="dob"></span></div>
            <div class="info-item"><b>สัญชาติ</b> <span id="nationality"></span></div>
            <div class="info-item"><b>ระดับปริญญา</b> <span id="degree"></span></div>
            <div class="info-item"><b>สาขาวิชา</b> <span id="major"></span></div>
            <div class="info-item"><b>สำนักวิชา</b> <span id="faculty"></span></div>
            <div class="info-item"><b>วันจบการศึกษา</b> <span id="gradDate"></span></div>
            <div class="info-item"><b>เกรดเฉลี่ย (GPAX)</b> <span id="gpa" class="highlight"></span></div>
            <div class="info-item"><b>วันที่ออกใบรับรอง</b> <span id="issueDate"></span></div>
        </div>
        <div class="info-item"><b>Merkle Root</b> <div style="word-break: break-all; background: #eee; padding: 10px; font-family: monospace;" id="merkleRoot"></div></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<script>
    const contractAddress = "0x1220f4305944d0dd9d20658bdDE6915bcCEfC4F2";
    const abi = [
        "function getTranscript(string calldata _certificateId) external view returns (tuple(string certificateId, string studentId, string studentName, string dateOfBirth, string nationality, string degree, string major, string faculty, string graduationDate, uint256 gpa, bytes32 merkleRoot, uint256 issuedAt, address issuedBy, bool revoked, bool consentToDisclose))"
    ];

    async function loadData() {
        const certId = new URLSearchParams(window.location.search).get('id') || "SUT001";
        const provider = new ethers.JsonRpcProvider("https://ethereum-sepolia-rpc.publicnode.com");
        const contract = new ethers.Contract(contractAddress, abi, provider);
        
        try {
            const info = await contract.getTranscript(certId);

            document.getElementById("certId").innerText = info.certificateId;
            document.getElementById("studentName").innerText = info.studentName;
            document.getElementById("dob").innerText = info.dateOfBirth;
            document.getElementById("nationality").innerText = info.nationality;
            document.getElementById("degree").innerText = info.degree;
            document.getElementById("major").innerText = info.major;
            document.getElementById("faculty").innerText = info.faculty;
            document.getElementById("gradDate").innerText = info.graduationDate;
            
            // ปรับทศนิยม GPA (ถ้าใน Contract เก็บเป็น 265 ให้หาร 100 จะได้ 2.65)
            document.getElementById("gpa").innerText = (Number(info.gpa) / 100).toFixed(2);
            
            // วันที่ออกใบรับรอง
            const date = new Date(Number(info.issuedAt) * 1000);
            document.getElementById("issueDate").innerText = date.toLocaleString('th-TH');
            
            document.getElementById("merkleRoot").innerText = info.merkleRoot;
        } catch (e) {
            console.error(e);
        }
    }
    loadData();
</script>
</body>
</html>
