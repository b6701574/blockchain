<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Transcript Verification</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid #f3841d; }
        .header { text-align: center; margin-bottom: 30px; }
        .status-verified { color: #28a745; font-weight: bold; font-size: 1.2em; margin-bottom: 10px; }
        
        .student-info { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: left; line-height: 1.6; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #f8f9fa; color: #666; font-size: 0.9em; }
        .grade { font-weight: bold; color: #1a3c5e; }

        .loading { text-align: center; padding: 40px; color: #f3841d; font-weight: bold; }
        .error-box { display: none; color: #dc3545; background: #ffe6e6; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .footer { margin-top: 30px; font-size: 11px; color: #999; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loading" class="loading">⏳ กำลังโหลดข้อมูลจาก Blockchain...</div>

        <div id="content" style="display: none;">
            <div class="header">
                <div class="status-verified">✓ ตรวจสอบความถูกต้องเรียบร้อย</div>
                <h2 style="margin: 5px 0;">ใบแสดงผลการเรียนดิจิทัล</h2>
                <small style="color: #888;">Blockchain Academic Record</small>
            </div>

            <div class="student-info">
                <strong>รหัสนักศึกษา:</strong> <span id="studentId"></span><br>
                <strong>เลขที่ใบรับรอง:</strong> <span id="certId" style="font-size: 0.8em; color: #666;"></span><br>
                <strong>วันที่ออกเอกสาร:</strong> <span id="issueDate"></span>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>รหัสวิชา</th>
                        <th>เกรด</th>
                    </tr>
                </thead>
                <tbody id="transcriptBody">
                    <!-- ข้อมูลเกรดจะถูกเพิ่มที่นี่ -->
                </tbody>
            </table>

            <div class="footer">
                ข้อมูลนี้ถูกบันทึกและยืนยันอย่างถาวรบน Sepolia Testnet<br>
                Smart Contract: <span id="contractAddr"></span>
            </div>
        </div>

        <div id="errorBox" class="error-box">
            <strong>❌ ตรวจสอบไม่สำเร็จ:</strong> <span id="errorMsg"></span>
        </div>
    </div>

    <script>
        // 🚩 1. ใส่ข้อมูลที่ถูกต้องของคุณตรงนี้
        const CONTRACT_ADDRESS = "0xf3f4DF7684cC599D4D799A4F47CCe18406A3E977"; 
        const RPC_URL = "https://rpc.sepolia.org";

        const ABI = [
            "function certificates(bytes32) external view returns (bytes32 merkleRoot, bool isRevoked, uint256 issuedAt)",
            "function getStudentRecord(string memory _studentId) external view returns (tuple(uint256 courseCode, string grade)[] memory)"
        ];

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const certId = urlParams.get('id');
            const studentId = urlParams.get('studentId'); // รับรหัสนักศึกษาเพิ่ม

            if (!certId || !studentId) {
                showError("ลิงก์ไม่สมบูรณ์ (ต้องมีทั้ง id และ studentId)");
                return;
            }

            try {
                const provider = new ethers.JsonRpcProvider(RPC_URL);
                const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);

                // 1. ดึงสถานะใบเซอร์ (เช็คว่ามีจริงไหม / โดนยกเลิกไหม)
                const certData = await contract.certificates(certId);
                if (certData.issuedAt === 0n) throw new Error("ไม่พบเลขที่ใบรับรองนี้ใน Blockchain");
                if (certData.isRevoked) throw new Error("ใบรับรองนี้ถูกเพิกถอน (Revoked) แล้ว");

                // 2. ดึงข้อมูล Transcript (รายวิชาและเกรด)
                const transcript = await contract.getStudentRecord(studentId);

                // แสดงผล
                document.getElementById('studentId').innerText = studentId;
                document.getElementById('certId').innerText = certId;
                document.getElementById('contractAddr').innerText = CONTRACT_ADDRESS;
                
                const date = new Date(Number(certData.issuedAt) * 1000);
                document.getElementById('issueDate').innerText = date.toLocaleString('th-TH');

                const tbody = document.getElementById('transcriptBody');
                transcript.forEach(course => {
                    const row = `<tr>
                        <td>${course.courseCode}</td>
                        <td class="grade">${course.grade}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

            } catch (err) {
                showError(err.message);
            }
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('errorMsg').innerText = msg;
            document.getElementById('errorBox').style.display = 'block';
        }

        window.onload = init;
    </script>
</body>
</html>
