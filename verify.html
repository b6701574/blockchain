<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUT Blockchain Transcript Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sut-orange: #e67e22; --verify-green: #27ae60; --revoked-red: #e74c3c; --bg-color: #f4f7f6; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid var(--sut-orange); position: relative; }
        .revoked-container { border-top: 8px solid var(--revoked-red) !important; }
        .revoked-watermark { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 80px; color: rgba(231, 76, 60, 0.15); pointer-events: none; }
        .status-badge { color: white; padding: 8px 20px; border-radius: 50px; margin-bottom: 10px; display: none; }
        .status-valid { background-color: var(--verify-green); }
        .status-revoked { background-color: var(--revoked-red); }
        .info-item { background: #fff9f5; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #eee; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div id="watermark" class="revoked-watermark">REVOKED</div>
    <header style="text-align:center">
        <div id="statusBadge" class="status-badge"></div>
        <h1 id="headerTitle">สำนักทะเบียนและประมวลผล</h1>
    </header>

    <div id="studentInfo">
        <div class="info-item"><b>ชื่อ-นามสกุล:</b> <span id="studentName">กำลังโหลด...</span></div>
        <div class="info-item"><b>GPAX:</b> <span id="gpa">-</span></div>
    </div>

    <table>
        <thead><tr><th>รหัสวิชา</th><th>หน่วยกิต</th><th>เกรด</th></tr></thead>
        <tbody id="courseTableBody"></tbody>
    </table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<script>
    const contractAddress = "0x1220f4305944d0dd9d20658bdDE6915bcCEfC4F2";
    // แก้ไข ABI ตรงนี้ให้ครบ 3 ค่า: string, uint256, string
    const abi = [
        "function getTranscript(string calldata _certificateId) external view returns (tuple(string certificateId, string studentId, string studentName, string dateOfBirth, string nationality, string degree, string major, string faculty, string graduationDate, uint256 gpa, bytes32 merkleRoot, uint256 issuedAt, address issuedBy, bool revoked, bool consentToDisclose))",
        "function getTranscriptCourses(string calldata _certificateId) external view returns (tuple(string courseCode, uint256 credits, string grade)[])"
    ];

    async function loadData() {
        const certId = new URLSearchParams(window.location.search).get('id');
        if (!certId) return;

        try {
            const provider = new ethers.JsonRpcProvider("https://ethereum-sepolia-rpc.publicnode.com");
            const contract = new ethers.Contract(contractAddress, abi, provider);
            
            const info = await contract.getTranscript(certId);
            const courses = await contract.getTranscriptCourses(certId);

            // สถานะ
            const statusBadge = document.getElementById("statusBadge");
            if (info.revoked) {
                statusBadge.innerText = "✖ ถูกเพิกถอน";
                statusBadge.className = "status-badge status-revoked";
                document.getElementById("mainContainer").classList.add("revoked-container");
                document.getElementById("watermark").style.display = "block";
            } else {
                statusBadge.innerText = "✓ ตรวจสอบผ่านบล็อกเชน";
                statusBadge.className = "status-badge status-valid";
            }
            statusBadge.style.display = "inline-block";

            document.getElementById("studentName").innerText = info.studentName;
            document.getElementById("gpa").innerText = (Number(info.gpa) / 10).toFixed(2);

            const tableBody = document.getElementById("courseTableBody");
            courses.forEach(c => {
                tableBody.innerHTML += `<tr><td>${c.courseCode}</td><td>${c.credits}</td><td>${c.grade}</td></tr>`;
            });

        } catch (e) {
            console.error(e);
            document.getElementById("studentName").innerText = "ไม่พบข้อมูล หรือติดเงื่อนไข PDPA";
        }
    }
    loadData();
</script>
</body>
</html>
